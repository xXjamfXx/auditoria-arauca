<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidado Multiactas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .columna-scroll { height: calc(100vh - 120px); overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative">

    <div id="bloqueo-central" class="fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/l102-remo.png" class="h-20 mx-auto mb-4">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                <h2 class="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">CONSULTA / SENADO / CITREP</h2>
                <input type="password" id="pass-maestra" placeholder="Contraseña" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-2xl text-center mb-4 outline-none focus:border-slate-800 transition-all tracking-widest">
                <button onclick="verificarAcceso()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest">INGRESAR</button>
            </div>
        </div>
    </div>

    <div id="contenido-dashboard" class="hidden p-4 md:p-8">
        
        <div class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-200 gap-4">
            <div class="flex items-center gap-4">
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/l102-remo.png" 
                     onclick="activarTruco()" 
                     class="h-12 w-auto cursor-pointer transition-transform active:scale-95">
                <div>
                    <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Resultados</h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Senado • CITREP • Consulta</p>
                    
                    <div class="flex items-center gap-1.5 mt-1">
                        <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                        <span id="status-text" class="text-[8px] font-black uppercase tracking-widest text-slate-400">Conectando...</span>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="menu-descargas" class="hidden gap-2">
                    <button onclick="exportarExcel()" class="bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl text-[10px] uppercase">Excel</button>
                    <button onclick="descargarPaqueteE14()" class="bg-blue-600 text-white font-bold px-4 py-2 rounded-xl text-[10px] uppercase">ZIP</button>
                </div>

                <button onclick="cambiarClavePropia()" class="bg-slate-100 text-slate-600 font-bold px-4 py-2 rounded-xl text-[10px] uppercase hover:bg-slate-200 transition-all">
                    Cambiar Clave
                </button>

                <button onclick="cerrarSesion()" class="bg-red-50 p-2.5 rounded-xl text-red-400 hover:text-red-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </div>

        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
            <div class="bg-white border-l-8 border-red-600 p-6 rounded-3xl shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">Senado</p>
                <h2 id="votos-senado" class="text-4xl font-black">0</h2>
            </div>
            <div class="bg-white border-l-8 border-purple-600 p-6 rounded-3xl shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">CITREP</p>
                <h2 id="votos-citrep" class="text-4xl font-black">0</h2>
            </div>
            <div class="bg-white border-l-8 border-emerald-600 p-6 rounded-3xl shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase">Consulta</p>
                <h2 id="votos-consulta" class="text-4xl font-black">0</h2>
            </div>
        </div>

        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 h-fit">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 border-b pb-2">Votos Municipales</h3>
                <div id="lista-municipios" class="space-y-2"></div>
            </div>
            <div class="lg:col-span-2 bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                
                <div class="flex flex-col sm:flex-row justify-between items-center mb-4 border-b pb-4 gap-3">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase">Visor de Actas Validadas</h3>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <select id="filtro-tipo" onchange="resetearGaleria()" class="bg-slate-50 text-[10px] font-bold p-2 rounded-xl border flex-1 outline-none">
                            <option value="todos">Todos los Tipos</option>
                            <option value="SENADO">Senado</option>
                            <option value="CITREP">CITREP</option>
                            <option value="CONSULTA">Consulta</option>
                        </select>
                        <select id="filtro-mun" onchange="resetearGaleria()" class="bg-slate-50 text-[10px] font-bold p-2 rounded-xl border flex-1 outline-none">
                            <option value="todos">Todos los Municipios</option>
                            <option value="1">Arauca</option>
                            <option value="2">Arauquita</option>
                            <option value="3">Cravo Norte</option>
                            <option value="4">Fortul</option>
                            <option value="5">Puerto Rondón</option>
                            <option value="6">Saravena</option>
                            <option value="7">Tame</option>
                        </select>
                    </div>
                </div>

                <div id="galeria-actas" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                
                <div class="mt-6 text-center">
                    <button id="btn-cargar-mas" onclick="cargarMasActas()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold px-6 py-2 rounded-xl text-[10px] uppercase transition-all shadow-sm">
                        ↓ Cargar más actas ↓
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const sUrl = 'https://fybolbgnxoertkocmmza.supabase.co';
        const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Ym9sYmdueG9lcnRrb2NtbXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTg4NzksImV4cCI6MjA4NzA3NDg3OX0.TtaObQZc_HnsG0qF7XZg7pkMo5_i1Sht_bcxrF8MoLE';
        const motorSupabase = supabase.createClient(sUrl, sKey);
        
        let datosCompletos = [];
        let clicCount = 0;
        let limiteGaleria = 12;
        const nombresMun = { 1: "Arauca", 2: "Arauquita", 3: "Cravo Norte", 4: "Fortul", 5: "Puerto Rondón", 6: "Saravena", 7: "Tame" };

        function activarTruco() {
            clicCount++;
            if (clicCount === 3) {
                const menu = document.getElementById('menu-descargas');
                menu.classList.remove('hidden');
                menu.classList.add('flex');
                alert("Opciones de exportación habilitadas.");
                clicCount = 0;
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('sesion_otros_l102');
            location.reload();
        }

        async function verificarAcceso() {
            const pass = document.getElementById('pass-maestra').value;
            const { data } = await motorSupabase.from('configuracion').select('clave_dashboard_otros').eq('id', 1).single();
            
            if (data && data.clave_dashboard_otros === pass) {
                localStorage.setItem('sesion_otros_l102', 'activa');
                document.getElementById('bloqueo-central').classList.add('hidden');
                document.getElementById('contenido-dashboard').classList.remove('hidden');
                refrescar();
                setInterval(refrescar, 20000);
            } else { alert("Clave Multiacta Incorrecta"); }
        }

        async function cambiarClavePropia() {
            const nueva = prompt("Ingrese la nueva clave para este Dashboard Multiacta:");
            if (!nueva || nueva.length < 4) return alert("Clave inválida o muy corta.");
            
            const { error } = await motorSupabase
                .from('configuracion')
                .update({ clave_dashboard_otros: nueva })
                .eq('id', 1);

            if (!error) alert("¡Clave actualizada! Úsela la próxima vez que ingrese.");
            else alert("Error al actualizar.");
        }

        async function refrescar() {
            try {
                const { data, error } = await motorSupabase.from('reportes')
                    .select('*')
                    .eq('estado', 'aprobado')
                    .neq('tipo_eleccion', 'CAMARA')
                    .order('creado_en', { ascending: false });

                if (error) throw error;

                datosCompletos = data || [];
                
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                document.getElementById('status-text').innerText = "ONLINE";
                document.getElementById('status-text').className = "text-[8px] font-black uppercase tracking-widest text-emerald-600";
                
                const tipos = ['SENADO', 'CITREP', 'CONSULTA'];
                tipos.forEach(t => {
                    const filtrados = datosCompletos.filter(r => r.tipo_eleccion === t);
                    const total = filtrados.reduce((sum, r) => sum + (r.votos_oficiales || 0), 0);
                    document.getElementById(`votos-${t.toLowerCase()}`).innerText = total.toLocaleString();
                });

                const divMun = document.getElementById('lista-municipios');
                divMun.innerHTML = '';
                Object.keys(nombresMun).forEach(id => {
                    const actasMun = datosCompletos.filter(r => r.municipio_id == id);
                    const v = actasMun.reduce((sum, r) => sum + (r.votos_oficiales || 0), 0);
                    const mesasCount = actasMun.length;

                    if(v > 0) {
                        divMun.innerHTML += `
                            <div class="flex justify-between items-center p-2 bg-slate-50 rounded-lg text-xs border border-slate-100">
                                <span class="font-bold text-slate-500 uppercase">${nombresMun[id]}</span>
                                <div class="text-right leading-tight">
                                    <span class="font-black text-slate-800 text-sm">${v.toLocaleString()} <span class="text-[8px] text-slate-400 font-normal">votos</span></span>
                                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">${mesasCount} actas</p>
                                </div>
                            </div>`;
                    }
                });

                renderizarGaleria();

            } catch (err) { 
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
                document.getElementById('status-text').innerText = "SIN CONEXIÓN";
                document.getElementById('status-text').className = "text-[8px] font-black uppercase tracking-widest text-red-500";
                console.log("Error de conexión:", err);
            }
        }

        function resetearGaleria() {
            limiteGaleria = 12;
            renderizarGaleria();
        }

        function cargarMasActas() {
            limiteGaleria += 12;
            renderizarGaleria();
        }

        function renderizarGaleria() {
            const filtroTipo = document.getElementById('filtro-tipo').value;
            const filtroMun = document.getElementById('filtro-mun').value;
            const divGal = document.getElementById('galeria-actas');
            divGal.innerHTML = '';
            
            let filtradas = datosCompletos;
            
            if (filtroTipo !== 'todos') filtradas = filtradas.filter(r => r.tipo_eleccion === filtroTipo);
            if (filtroMun !== 'todos') filtradas = filtradas.filter(r => r.municipio_id == filtroMun);

            const btnMas = document.getElementById('btn-cargar-mas');
            if (filtradas.length > limiteGaleria) {
                btnMas.classList.remove('hidden');
            } else {
                btnMas.classList.add('hidden');
            }

            if (filtradas.length === 0) {
                divGal.innerHTML = `<p class="col-span-full text-center text-xs text-slate-400 py-8 uppercase tracking-widest font-bold">No hay actas con estos filtros</p>`;
                return;
            }

            filtradas.slice(0, limiteGaleria).forEach(r => {
                divGal.innerHTML += `<div class="bg-slate-50 p-2 rounded-xl text-center border border-slate-100 shadow-sm hover:border-blue-200 transition-colors">
                    <img src="${r.foto_url}" class="w-full h-20 object-cover rounded-lg mb-1 cursor-pointer" onclick="window.open('${r.foto_url}')">
                    <p class="text-[8px] font-black text-blue-600 uppercase mt-2">${r.tipo_eleccion}</p>
                    <p class="text-[9px] font-bold text-slate-600 uppercase truncate px-1">${nombresMun[r.municipio_id]}</p>
                    <p class="text-[10px] font-black text-slate-800">Mesa ${r.mesa_numero}</p>
                </div>`;
            });
        }

        if (localStorage.getItem('sesion_otros_l102') === 'activa') {
            document.getElementById('bloqueo-central').classList.add('hidden');
            document.getElementById('contenido-dashboard').classList.remove('hidden');
            refrescar();
            setInterval(refrescar, 20000);
        }

        function exportarExcel() {
            const reporte = datosCompletos.map(r => ({
                'FECHA': new Date(r.creado_en).toLocaleString(),
                'TIPO': r.tipo_eleccion,
                'MUNICIPIO': nombresMun[r.municipio_id],
                'MESA': r.mesa_numero,
                'VOTOS': r.votos_oficiales
            }));
            const ws = XLSX.utils.json_to_sheet(reporte);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Otros_Resultados");
            XLSX.writeFile(wb, "Consolidado_Multiacta_L102.xlsx");
        }

        async function descargarPaqueteE14() {
            const zip = new JSZip();
            const carpeta = zip.folder("Actas_Otros");
            const promesas = datosCompletos.map(async (r) => {
                const res = await fetch(r.foto_url);
                const blob = await res.blob();
                carpeta.file(`${r.tipo_eleccion}_${nombresMun[r.municipio_id]}_Mesa_${r.mesa_numero}.jpg`, blob);
            });
            await Promise.all(promesas);
            const content = await zip.generateAsync({ type: "blob" });
            saveAs(content, "Actas_Otros_L102.zip");
        }
    </script>
</body>
</html>
