<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación de Validación Segura - Arauca 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #pantalla-login, #interfaz-trabajo, #pantalla-roles { position: relative; z-index: 10; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen relative overflow-x-hidden">

    <div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-15 pointer-events-none" 
         style="background-image: url('https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/fondo_candidato.JPG'); mix-blend-mode: multiply;">
    </div>

    <div id="pantalla-login" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white/95 p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border-t-4 border-blue-500 backdrop-blur-md">
            <div class="mb-6">
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/l102-remo.png" alt="Logo" class="h-24 w-auto object-contain drop-shadow-md inline-block">
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/L102-NUMERO.png" alt="102" class="h-24 w-auto object-contain drop-shadow-md inline-block">
                <p class="text-slate-400 text-[10px] font-black uppercase mt-1 tracking-widest">Validación Municipal</p>
            </div>
            <div class="space-y-4">
                <select id="select-inicio" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all">
                    <option value="">-- Municipio --</option>
                    <option value="1">ARAUCA</option>
                    <option value="2">ARAUQUITA</option>
                    <option value="3">CRAVO NORTE</option>
                    <option value="4">FORTUL</option>
                    <option value="5">PUERTO RONDÓN</option>
                    <option value="6">SARAVENA</option>
                    <option value="7">TAME</option>
                </select>
                <input type="password" id="pass-inicio" placeholder="CONTRASEÑA" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500 text-center tracking-widest">
                <button onclick="iniciarSesionSegura()" class="w-full bg-slate-700 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-slate-800 transition-all uppercase text-sm">
                    Ingresar a Estación
                </button>
            </div>
        </div>
    </div>

    <div id="pantalla-roles" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
             <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/l102-remo.png" alt="Logo" class="h-24 w-auto object-contain drop-shadow-md inline-block">
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/L102-NUMERO.png" alt="102" class="h-24 w-auto object-contain drop-shadow-md inline-block">
            <p class="text-slate-500 text-[10px] font-bold mb-6 uppercase tracking-widest">Puesto Saravena</p>
            <div class="space-y-3">
                <button onclick="seleccionarRol('ING. URIEL')" class="w-full bg-slate-50 hover:bg-blue-50 border-2 border-slate-100 p-4 rounded-2xl font-black text-blue-900 uppercase text-xs"> ING. URIEL </button>
                <button onclick="seleccionarRol('ANA TRIANA')" class="w-full bg-slate-50 hover:bg-blue-50 border-2 border-slate-100 p-4 rounded-2xl font-black text-blue-900 uppercase text-xs"> ANA TRIANA</button>
                <button onclick="seleccionarRol('MAYERLI')" class="w-full bg-slate-50 hover:bg-blue-50 border-2 border-slate-100 p-4 rounded-2xl font-black text-blue-900 uppercase text-xs"> MAYERLI</button>
            </div>
        </div>
    </div>

    <div id="interfaz-trabajo" class="hidden">
        <nav class="bg-white/90 border-b border-slate-200 p-4 sticky top-0 z-40 shadow-sm flex justify-between items-center backdrop-blur-md">
            <div class="flex items-center gap-3">
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/l102-remo.png" class="h-16 w-auto">
                <div>
                    <h1 id="titulo-municipio" class="text-xl font-black text-blue-900 uppercase"></h1>
                    <p id="identidad-validador" class="text-[9px] font-black text-slate-400 uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="cerrarSesion()" class="text-[10px] font-black text-red-500 border border-red-100 px-3 py-1 rounded-lg uppercase">Salir</button>
        </nav>

        <div class="p-6 max-w-5xl mx-auto">
            <div id="contenedor-reportes" class="space-y-8"></div>
        </div>
    </div>

    <div class="w-full text-center py-8 opacity-40 pointer-events-none">
        <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] leading-relaxed">
            Propiedad Intelectual de JAMF<br>
            © 2026 Auditoría Electoral L102 • Todos los derechos reservados
        </p>
    </div>

    <script>
        const sUrl = 'https://fybolbgnxoertkocmmza.supabase.co';
        const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Ym9sYmdueG9lcnRrb2NtbXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTg4NzksImV4cCI6MjA4NzA3NDg3OX0.TtaObQZc_HnsG0qF7XZg7pkMo5_i1Sht_bcxrF8MoLE';
        const sClient = supabase.createClient(sUrl, sKey);

        let municipioActual = null;
        let nombreMunActual = "";
        let validadorActual = "";
        let timer = null;

        const nombres = { 1: "Arauca", 2: "Arauquita", 3: "Cravo Norte", 4: "Fortul", 5: "Puerto Rondón", 6: "Saravena", 7: "Tame" };

        function generarHashEquitativo(str) {
            let hash = 5381;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) + hash) + str.charCodeAt(i);
            }
            return Math.abs(hash);
        }

        window.onload = () => {
            const munGuardado = localStorage.getItem('sesion_validador_munId');
            const nombreGuardado = localStorage.getItem('sesion_validador_munNombre');
            const valGuardado = localStorage.getItem('sesion_validador_identidad');
            
            if (munGuardado && nombreGuardado) {
                municipioActual = munGuardado;
                nombreMunActual = nombreGuardado;
                validadorActual = valGuardado || "";

                if (municipioActual === "6" && !validadorActual) {
                    document.getElementById('pantalla-login').classList.add('hidden');
                    document.getElementById('pantalla-roles').classList.remove('hidden');
                } else {
                    mostrarInterfaz();
                }
            }
        };

        async function iniciarSesionSegura() {
            const idMun = document.getElementById('select-inicio').value;
            const passIngresada = document.getElementById('pass-inicio').value;
            if (!idMun || !passIngresada) return alert("Datos incompletos");

            try {
                const { data, error } = await sClient.from('llaves_municipales').select('clave').eq('municipio_id', idMun).single();
                if (data && data.clave === passIngresada) {
                    municipioActual = idMun;
                    nombreMunActual = nombres[idMun];
                    localStorage.setItem('sesion_validador_munId', idMun);
                    localStorage.setItem('sesion_validador_munNombre', nombreMunActual);
                    
                    if (idMun === "6") {
                        document.getElementById('pantalla-login').classList.add('hidden');
                        document.getElementById('pantalla-roles').classList.remove('hidden');
                    } else {
                        validadorActual = "";
                        localStorage.removeItem('sesion_validador_identidad');
                        mostrarInterfaz();
                    }
                } else { alert("Clave incorrecta"); }
            } catch (err) { alert("Error de acceso"); }
        }

        function seleccionarRol(rol) {
            validadorActual = rol;
            localStorage.setItem('sesion_validador_identidad', rol);
            document.getElementById('pantalla-roles').classList.add('hidden');
            mostrarInterfaz();
        }

        function mostrarInterfaz() {
            document.getElementById('titulo-municipio').innerText = nombreMunActual;
            document.getElementById('identidad-validador').innerText = validadorActual;
            document.getElementById('pantalla-login').classList.add('hidden');
            document.getElementById('interfaz-trabajo').classList.remove('hidden');
            cargarDatos();
            if(!timer) timer = setInterval(cargarDatos, 4000);
        }

        function cerrarSesion() {
            clearInterval(timer);
            localStorage.clear();
            location.reload();
        }

        async function cargarDatos() {
            const { data, error } = await sClient
                .from('reportes')
                .select('*')
                .eq('municipio_id', municipioActual)
                .eq('estado', 'pendiente')
                .eq('tipo_eleccion', 'CAMARA')
                .order('creado_en', { ascending: true });

            const container = document.getElementById('contenedor-reportes');
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="text-center py-20 bg-white/70 rounded-3xl border border-slate-200 backdrop-blur-sm"><p class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Esperando nuevos reportes...</p></div>`;
                return;
            }
            if (document.activeElement.tagName === 'INPUT') return;

            container.innerHTML = '';

            let dataFiltrada = data;
            if (municipioActual === "6" && validadorActual !== "") {
                let numValidador = 0;
                if (validadorActual === 'ING. URIEL') numValidador = 1;
                if (validadorActual === 'ANA TRIANA') numValidador = 2;
                if (validadorActual === 'MAYERLI') numValidador = 3;
                
                dataFiltrada = data.filter(r => {
                    const hashValue = generarHashEquitativo(r.id.toString());
                    return (hashValue % 3) === (numValidador - 1);
                });
            }

            if (dataFiltrada.length === 0) {
                container.innerHTML = `<div class="text-center py-10 font-bold text-slate-400 uppercase text-[10px]">Bandeja vacía. Sin actas asignadas a tu perfil en este momento.</div>`;
                return;
            }

            dataFiltrada.forEach(r => {
                const card = document.createElement('div');
                card.className = "bg-white/95 rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border-l-[12px] border-blue-600 mb-6 backdrop-blur-sm";
                card.innerHTML = `
                    <div class="md:w-1/2 bg-slate-900 flex items-center justify-center p-2">
                        <img src="${r.foto_url}" class="max-h-[500px] rounded-lg shadow-2xl cursor-zoom-in" onclick="window.open('${r.foto_url}')">
                    </div>
                    <div class="md:w-1/2 p-8 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Mesa ${r.mesa_numero}</span>
                                <span class="text-[9px] font-mono text-slate-400">REF: ${r.id.toString().slice(-4)}</span>
                            </div>
                            <h3 class="text-3xl font-black text-slate-800 leading-tight">${r.puesto_nombre}</h3>
                            <div class="mt-4 p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Dato Testigo:</p>
                                <p class="text-3xl font-black text-slate-700">${r.votos_candidato} <span class="text-sm font-normal text-slate-400 uppercase">Votos</span></p>
                            </div>
                        </div>
                        <div class="mt-8 space-y-4">
                            <input type="number" id="votos-${r.id}" value="${r.votos_candidato}" class="w-full border-4 border-emerald-500 p-5 rounded-2xl text-5xl font-black text-emerald-700 outline-none bg-emerald-50/30">
                            <div class="flex gap-3">
                                <button onclick="procesar('${r.id}', 'aprobado')" class="flex-1 bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-emerald-600 transition-all uppercase text-xs tracking-widest">Validar ✅</button>
                                <button onclick="procesar('${r.id}', 'rechazado')" class="px-6 bg-red-50 text-red-500 font-bold py-5 rounded-2xl hover:bg-red-100 transition-all uppercase text-[9px]">Rechazar ❌</button>
                            </div>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        async function procesar(id, estado) {
            const v = document.getElementById('votos-' + id).value;
            const { error } = await sClient.from('reportes')
                .update({ estado: estado, votos_oficiales: parseInt(v), validador_identidad: validadorActual })
                .eq('id', id);
            if (!error) cargarDatos();
            else alert("Error de red. Intente de nuevo.");
        }
    </script>
</body>
</html>
