<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Municipal - Consulta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative overflow-x-hidden">

    <div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-[0.05] pointer-events-none" 
         style="background-image: url('https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/fondo_candidato.JPG'); filter: grayscale(10%); mix-blend-mode: multiply;">
    </div>

    <div id="pantalla-ingreso" class="fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <div class="mb-8 text-center">
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/l102-remo.png"  
                     alt="Logo L102" 
                     class="h-24 w-auto object-contain drop-shadow-md inline-block mb-2">
                <br>
                <img src="https://fybolbgnxoertkocmmza.supabase.co/storage/v1/object/public/recursos/L102-NUMERO.png"
                     alt="Numero 102" 
                     class="h-24 w-auto object-contain drop-shadow-md inline-block">
            </div>
            
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                <h2 class="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">DASHBOARD CONSULTA</h2>
                <select id="filtro-municipio" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-2xl text-center font-black text-lg mb-6 focus:border-blue-500 outline-none transition-all text-blue-900 uppercase">
                    <option value="">-- SELECCIONE MUNICIPIO --</option>
                    <option value="1">ARAUCA</option>
                    <option value="2">ARAUQUITA</option>
                    <option value="3">CRAVO NORTE</option>
                    <option value="4">FORTUL</option>
                    <option value="5">PUERTO RONDON</option>
                    <option value="6">SARAVENA</option>
                    <option value="7">TAME</option>
                </select>
                <button onclick="ingresarDashboard()" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-black py-4 rounded-2xl transition-all uppercase tracking-widest text-sm shadow-lg">
                    INGRESAR
                </button>
            </div>
        </div>
    </div>

    <div id="pantalla-dashboard" class="hidden p-4 md:p-8 relative z-10">
        
        <div class="max-w-6xl mx-auto bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-blue-900 uppercase tracking-tighter">Resultados Consulta</h1>
                <p id="texto-municipio" class="text-xs font-black text-slate-500 uppercase tracking-widest mt-1"></p>
                
                <div class="flex items-center gap-1.5 mt-2">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                    <span id="status-text" class="text-[8px] font-black uppercase tracking-widest text-slate-400">Conectando...</span>
                </div>
            </div>
            
            <div class="flex gap-2 flex-wrap justify-end">
                <button id="btn-descargar-zip" onclick="descargarPaqueteE14()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-3 rounded-2xl flex items-center gap-2 transition-all text-xs shadow-md">
                    Descargar Actas (ZIP)
                </button>
                <button onclick="volverInicio()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold px-6 py-3 rounded-2xl transition-all uppercase tracking-widest text-xs border border-slate-200 shadow-sm">
                    Cambiar Municipio
                </button>
            </div>
        </div>

        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-emerald-600 p-8 rounded-3xl shadow-lg text-white text-center relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 text-emerald-500 text-9xl font-black italic group-hover:scale-110 transition-transform opacity-50">V</div>
                <p class="text-[10px] font-black uppercase tracking-widest text-emerald-200 mb-2 relative z-10">Votos Totales Consulta</p>
                <h2 id="total-votos" class="text-7xl font-black tracking-tighter relative z-10">0</h2>
            </div>
            <div class="bg-white border border-slate-200 p-8 rounded-3xl shadow-sm text-center flex flex-col justify-center relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 text-slate-50 text-9xl font-black italic group-hover:scale-110 transition-transform">M</div>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 relative z-10">Mesas Reportadas</p>
                <h2 id="total-mesas" class="text-6xl font-black text-blue-900 tracking-tighter relative z-10">0</h2>
            </div>
        </div>

        <div class="max-w-6xl mx-auto bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 border-b border-slate-100 pb-4">Galeria de Actas (Consulta)</h3>
            <div id="galeria-actas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
        
        <div class="max-w-6xl mx-auto text-center py-12 opacity-40 pointer-events-none">
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] leading-relaxed">
                Propiedad Intelectual de JAMF<br>
                © 2026 Auditoria Electoral L102
            </p>
        </div>
    </div>

    <script>
        const sUrl = 'https://fybolbgnxoertkocmmza.supabase.co';
        const sKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5Ym9sYmdueG9lcnRrb2NtbXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0OTg4NzksImV4cCI6MjA4NzA3NDg3OX0.TtaObQZc_HnsG0qF7XZg7pkMo5_i1Sht_bcxrF8MoLE';
        const motorSupabase = supabase.createClient(sUrl, sKey);
        
        let intervaloActualizacion = null;
        let datosDescargaActuales = []; // Variable global para guardar los datos y poder descargarlos
        const nombresMun = { "1": "ARAUCA", "2": "ARAUQUITA", "3": "CRAVO NORTE", "4": "FORTUL", "5": "PUERTO RONDON", "6": "SARAVENA", "7": "TAME" };

        function ingresarDashboard() {
            const select = document.getElementById('filtro-municipio');
            const munId = select.value;
            
            if (!munId) return alert("Por favor seleccione un municipio.");

            const nombreMun = select.options[select.selectedIndex].text;
            document.getElementById('texto-municipio').innerText = "MUNICIPIO: " + nombreMun;

            document.getElementById('pantalla-ingreso').classList.add('hidden');
            document.getElementById('pantalla-dashboard').classList.remove('hidden');

            refrescar();
            intervaloActualizacion = setInterval(refrescar, 5000);
        }

        function volverInicio() {
            if (intervaloActualizacion) clearInterval(intervaloActualizacion);
            
            document.getElementById('filtro-municipio').value = "";
            document.getElementById('pantalla-dashboard').classList.add('hidden');
            document.getElementById('pantalla-ingreso').classList.remove('hidden');
            
            document.getElementById('total-votos').innerText = "0";
            document.getElementById('total-mesas').innerText = "0";
            document.getElementById('galeria-actas').innerHTML = "";
            
            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-slate-300";
            document.getElementById('status-text').innerText = "ESPERANDO...";
            document.getElementById('status-text').className = "text-[8px] font-black uppercase tracking-widest text-slate-400";
            datosDescargaActuales = [];
        }

        async function refrescar() {
            const munId = document.getElementById('filtro-municipio').value;
            if (!munId) return;
            
            try {
                const { data, error } = await motorSupabase
                    .from('reportes')
                    .select('*')
                    .eq('tipo_eleccion', 'CONSULTA')
                    .eq('estado', 'aprobado')
                    .eq('municipio_id', parseInt(munId))
                    .order('creado_en', { ascending: false });

                if (error) throw error;
                
                datosDescargaActuales = data; // Guardamos los datos para el botón ZIP

                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                document.getElementById('status-text').innerText = "ONLINE";
                document.getElementById('status-text').className = "text-[8px] font-black uppercase tracking-widest text-emerald-600";

                const totalVotos = data.reduce((sum, r) => sum + (r.votos_candidato || 0), 0);
                
                document.getElementById('total-votos').innerText = totalVotos.toLocaleString();
                document.getElementById('total-mesas').innerText = data.length;

                const divGaleria = document.getElementById('galeria-actas');
                divGaleria.innerHTML = '';

                if (data.length === 0) {
                    divGaleria.innerHTML = '<p class="col-span-full text-center text-xs text-slate-400 py-8 uppercase tracking-widest font-bold">No hay actas registradas aun para este municipio.</p>';
                    return;
                }

                let descargadas = JSON.parse(localStorage.getItem('actas_descargadas')) || [];

                data.forEach(r => {
                    const cedulaTexto = r.testigo_cedula ? r.testigo_cedula : 'SIN_CEDULA';
                    const munTexto = nombresMun[r.municipio_id] || 'MUNICIPIO';
                    const nombreArchivoDeseado = `${cedulaTexto}_${munTexto}_MESA_${r.mesa_numero}.jpg`;
                    
                    const estaDescargada = descargadas.includes(r.foto_url);
                    const borderClass = estaDescargada ? 'border-4 border-emerald-500 bg-emerald-50 opacity-80' : 'border border-slate-100 hover:border-blue-200';
                    const badgeHtml = estaDescargada ? '<div class="absolute top-2 right-2 bg-emerald-500 text-white text-[8px] font-black px-2 py-1 rounded-bl-lg rounded-tr-xl z-10 shadow-sm">DESCARGADA</div>' : '';

                    divGaleria.innerHTML += `
                        <div class="p-2 rounded-xl text-center shadow-sm transition-all relative ${borderClass}">
                            ${badgeHtml}
                            <img src="${r.foto_url}" class="w-full h-24 object-cover rounded-lg mb-2 cursor-pointer relative z-0" onclick="registrarDescarga('${r.foto_url}', '${nombreArchivoDeseado}')" title="Click para descargar">
                            <p class="text-[9px] font-black text-slate-600 uppercase truncate px-1" title="${r.puesto_nombre}">${r.puesto_nombre}</p>
                            <p class="text-[10px] font-black text-blue-900 mt-1">MESA ${r.mesa_numero}</p>
                            <p class="text-xs font-black text-emerald-600 mt-1">${r.votos_candidato} VOTOS</p>
                        </div>
                    `;
                });

            } catch (err) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500";
                document.getElementById('status-text').innerText = "SIN CONEXION";
                document.getElementById('status-text').className = "text-[8px] font-black uppercase tracking-widest text-red-500";
            }
        }

        async function registrarDescarga(url, nombreDeseado) {
            let descargadas = JSON.parse(localStorage.getItem('actas_descargadas')) || [];
            if (!descargadas.includes(url)) {
                descargadas.push(url);
                localStorage.setItem('actas_descargadas', JSON.stringify(descargadas));
            }
            descargarImagenForce(url, nombreDeseado);
            refrescar();
        }

        async function descargarImagenForce(url, nombreDeseado) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = nombreDeseado;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (error) {
                window.open(url, '_blank');
            }
        }

        async function descargarPaqueteE14() {
            if (datosDescargaActuales.length === 0) return alert("No hay actas de Consulta para descargar.");
            
            const btn = document.getElementById('btn-descargar-zip');
            const originalText = btn.innerHTML;
            btn.innerText = "Organizando carpetas...";
            btn.disabled = true;

            const zip = new JSZip();
            const root = zip.folder("e14_Consulta");
            
            try {
                const promesas = datosDescargaActuales.map(async (r) => {
                    try {
                        const response = await fetch(r.foto_url);
                        const blob = await response.blob();
                        
                        const munNombre = nombresMun[r.municipio_id] || "Otros";
                        const puestoNombre = (r.puesto_nombre || "SIN_NOMBRE").replace(/[/\\?%*:|"<>]/g, '-');
                        
                        const carpetaMun = root.folder(munNombre);
                        const carpetaColegio = carpetaMun.folder(puestoNombre);
                        
                        const nombreArchivo = `Mesa_${r.mesa_numero}_CONSULTA.jpg`;
                        
                        carpetaColegio.file(nombreArchivo, blob);
                    } catch (e) { 
                        console.error("Error descargando imagen:", r.foto_url); 
                    }
                });

                await Promise.all(promesas);
                btn.innerText = "Comprimiendo...";
                const content = await zip.generateAsync({ type: "blob" });
                
                const select = document.getElementById('filtro-municipio');
                const nombreMun = select.options[select.selectedIndex].text;
                saveAs(content, `Actas_Consulta_${nombreMun}.zip`);
            } catch (err) {
                alert("Error al generar el paquete estructurado.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
